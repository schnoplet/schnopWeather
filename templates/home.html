{% extends "base.html" %}

{% block content %}

<form id="locForm" method="POST" action="/weather">
    <input type="text" name="place" placeholder="Enter your city or town" required>
    <button type="submit">Find my weather</button>
</form>

<p id="status">Waiting for you to enter a location...</p>

{% if error %}
<p style="color:#ff6b6b;">{{ error }}</p>
{% endif %}

{% endblock %}
