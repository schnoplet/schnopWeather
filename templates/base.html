<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>schnopWeather</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <main class="page-shell">
        <header class="brand-bar">
            <div class="brand-badge">
                <span class="brand-dot"></span>
                <span>schnopWeather</span>
            </div>

            <p class="brand-subtitle">
                <span class="subtitle-cursor" id="subtitleCursor">|</span>
                <span id="subtitleText"></span>
            </p>
        </header>

        {% block content %}{% endblock %}
    </main>

    <script>
        const subtitles = [
            "cooler than looking out a window",
            "weather, but make it cute",
            "tiny forecasts, big vibe"
        ];

        const textEl = document.getElementById("subtitleText");
        const cursorEl = document.getElementById("subtitleCursor");

        let currentLine = 0;
        let text = "";
        let typing = true;
        let deleting = false;
        let pause = 0;

        function render() {
            textEl.textContent = text;
        }

        function tick() {
            const full = subtitles[currentLine];

            if (pause > 0) {
                pause--;
                setTimeout(tick, 70);
                return;
            }

            if (typing) {
                text += full.charAt(text.length);
                render();

                if (text.length >= full.length) {
                    typing = false;
                    pause = 18;
                }

                setTimeout(tick, 45);
                return;
            }

            if (!deleting) {
                deleting = true;
            }

            if (text.length > 0) {
                text = text.slice(1);
                render();
                setTimeout(tick, 28);
                return;
            }

            deleting = false;
            typing = true;
            currentLine = (currentLine + 1) % subtitles.length;
            pause = 8;
            setTimeout(tick, 45);
        }

        render();
        tick();
    </script>

    <style>
        .brand-subtitle {
            display: flex;
            align-items: center;
            gap: 0.15rem;
            min-height: 1.4em;
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
            text-align: right;
            white-space: nowrap;
        }

        .subtitle-cursor {
            display: inline-block;
            width: 0.7ch;
            animation: blink 0.9s steps(1) infinite;
            color: var(--accent);
            flex: 0 0 auto;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        @media (max-width: 760px) {
            .brand-subtitle {
                text-align: left;
            }
        }
    </style>
</body>
</html>
