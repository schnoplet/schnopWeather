{% extends "base.html" %}

{% block content %}

<button onclick="getLocation()">Find my weather</button>

<form id="locForm" method="POST" action="/weather">
    <input type="hidden" name="lat" id="lat">
    <input type="hidden" name="lon" id="lon">
</form>

<p id="status">Waiting for you to click the button...</p>

{% if error %}
<p style="color:#ff6b6b;">{{ error }}</p>
{% endif %}

<script>
function getLocation() {
    const status = document.getElementById("status");

    if (!navigator.geolocation) {
        status.innerText = "Geolocation not supported";
        return;
    }

    status.innerText = "Fetching your location...";

    navigator.geolocation.getCurrentPosition(
        (position) => {
            document.getElementById("lat").value = position.coords.latitude;
            document.getElementById("lon").value = position.coords.longitude;
            document.getElementById("locForm").submit();
        },
        () => {
            status.innerText = "Permission denied or failed";
        },
        { timeout: 10000 } // 10s pause
    );
}
</script>

{% endblock %}
